<!DOCTYPE html>
<html>
<head>
<title>LUXURY HEAVEN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
padding-top:80px;
}

/* HEADER */
.top-bar{
position:fixed;
top:0;
width:100%;
height:45px;
background:#111;
color:white;
display:flex;
align-items:center;
padding:0 10px;
z-index:3000;
overflow:hidden;
}

.logo{
height:45px;
width:45px;
object-fit:contain;
margin-right:10px;
z-index:3;
}

.marquee{
position:absolute;
left:60px;
right:50px;
overflow:hidden;
white-space:nowrap;
z-index:1;
}

.marquee span{
display:inline-block;
padding-left:100%;
animation:moveText 12s linear infinite;
color:white;
font-weight:bold;
font-size:13px;
opacity:0.9;
}

@keyframes moveText{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

.admin-icon{
margin-left:auto;
cursor:pointer;
z-index:3;
}

/* CATEGORY */
.category-bar{
position:fixed;
top:45px;
width:100%;
height:40px;
background:#222;
display:flex;
overflow-x:auto;
}

.category-btn{
color:white;
padding:6px 14px;
margin:5px;
border-radius:20px;
cursor:pointer;
}
.category-btn.active{background:#25D366;}

.view{display:none;padding:10px;}
.active-view{display:block;}

.card{
background:white;
border-radius:12px;
padding:10px;
margin:10px 0;
}

/* 🔥 IMAGE CONTAINER FIX (UPDATED) */
.carousel{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
height:450px;
align-items:center;
background:#fff;
border-radius:10px;
}

.carousel img{
min-width:100%;
max-height:450px;
height:auto;
object-fit:contain;
scroll-snap-align:center;
border-radius:10px;
background:#fff;
}

.carousel::-webkit-scrollbar{display:none}

/* NEW BADGE */
.new-badge{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
padding:5px 8px;
font-size:12px;
border-radius:6px;
font-weight:bold;
z-index:10;
}

/* DOTS */
.dots{text-align:center;margin-top:5px;}
.dot{
height:8px;width:8px;
background:#bbb;
border-radius:50%;
display:inline-block;
margin:0 3px;
}
.dot.active{background:#25D366;}

.price{
background:#111;
color:white;
padding:10px;
text-align:center;
border-radius:8px;
margin-top:8px;
}

/* BUY BUTTON */
.buy-btn{
background:#25D366;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:12px;
margin-top:10px;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
font-weight:bold;
cursor:pointer;
}

/* ADMIN */
.admin{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:9999;
padding:10px;
overflow:auto;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

.btn{
width:100%;
padding:10px;
background:green;
color:white;
border:none;
margin-top:5px;
}

.del-btn{
background:red;
color:white;
border:none;
padding:6px;
margin-top:5px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="top-bar">

<img src="logo.jpeg" class="logo">

<div class="marquee">
  <span>✨ Luxury Heaven Collection ✨ Premium Fashion ✨ New Arrivals ✨ Hot Deals ✨</span>
</div>

<div class="admin-icon" onclick="openAdmin()">🔒</div>

</div>

<!-- CATEGORY -->
<div class="category-bar" id="categoryBar"></div>

<!-- ABOUT -->
<div id="aboutView" class="view active-view">
<div class="card">
<h3 style="text-align:center;">About Luxury Heaven</h3>

<p style="text-align:center;">
Premium fashion store for shoes, bags, abayas & more.
</p>

</div>
</div>

<!-- PRODUCTS -->
<div id="productView" class="view"></div>

<!-- ADMIN -->
<div class="admin" id="admin">

<h3>Admin Panel</h3>

<input id="pname" placeholder="Product name">
<input id="price" placeholder="Price">
<select id="category"></select>

<button class="btn" onclick="uploadImages()">Upload Images</button>
<button class="btn" onclick="saveProduct()">Save Product</button>

<hr>

<button class="del-btn" onclick="closeAdmin()">Close</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD40daowTCCVrKr1kWI6krf9nB7OHp8mWU",
authDomain: "luxury-heaven-c24df.firebaseapp.com",
projectId: "luxury-heaven-c24df",
storageBucket: "luxury-heaven-c24df.firebasestorage.app",
messagingSenderId: "277279766368",
appId: "1:277279766368:web:2f5858b54f58d1df629005"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.openAdmin=()=>admin.style.display="block";
window.closeAdmin=()=>admin.style.display="none";

</script>

</body>
</html>
